<svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Gradiente fuerte y moderno -->
    <linearGradient id="mainGradient" x1="0" y1="0" x2="72" y2="72">
      <stop offset="0%" stop-color="#FF3B30"/>
      <stop offset="50%" stop-color="#FF6A00"/>
      <stop offset="100%" stop-color="#FFC300"/>
    </linearGradient>

    <!-- Glow sutil -->
    <filter id="softGlow">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#FF6A00" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Fondo vibrante redondeado (sin negro) -->
  <rect x="6" y="6" width="60" height="60" rx="18" fill="url(#mainGradient)" filter="url(#softGlow)"/>

  <!-- Casa más grande -->
  <path d="M18 38L36 22L54 38V52C54 54 52.5 56 50 56H22C19.5 56 18 54 18 52V38Z"
        fill="white"/>

  <!-- Puerta -->
  <rect x="32" y="42" width="8" height="14" rx="2" fill="#FF6A00"/>

  <!-- Línea techo -->
  <path d="M14 38L36 18L58 38"
        stroke="white"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"/>

</svg>